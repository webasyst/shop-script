<div class="dialog" id="s-add-storefront-dialog">
    <div class="dialog-background"></div>

    <div class="dialog-body">
        <form>
            <header class="dialog-header">
                <h1>[`New storefront`]</h1>
            </header>

            <main class="dialog-content">
                <p class="small">
                    {sprintf_wp(
                        'To manage multiple domains or delete previously published storefronts, use the <a %s>Site</a> app with full administrator access.',
                        sprintf(
                            'href="%s"',
                            $wa_backend_url|cat:'site/'
                        )
                    )}
                </p>
                <div class="fields">
                    <div class="field">
                        <div class="name">
                            [`Domain`]
                        </div>
                        <div class="value">
                            <div class="wa-select small">
                                <select name="domain">
                                    {foreach $domains as $d => $label}
                                        <option value="{$d|escape}">{$label|escape}</option>
                                    {/foreach}
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="field">
                        <div class="name">
                            [`URL`]
                        </div>
                        <div class="value">
                            <input type="text" name="url" value="shop/*" class="small bold" />
                        </div>
                    </div>
                    <div class="field">
                        <div class="name">
                            [`Design theme`]
                        </div>
                        <div class="value">
                            <div class="wa-select small">
                                <select name="theme">
                                    {foreach $themes as $theme_id => $theme_name}
                                        <option value="{$theme_id|escape}">{$theme_name|escape}</option>
                                    {/foreach}
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <footer class="dialog-footer">
                <input type="submit" class="button green js-submit-button" value="[`Add storefront`]">
                <button type="button" class="button light-gray js-dialog-close">[`Cancel`]</button>
            </footer>
        </form>
    </div>
</div>
