# https://swagger.io/docs/specification/about/
openapi: 3.0.0

info:
  title: 'Shop-Script Storefront API'
  version: 1.0.0
  contact:
    name: Webasyst
servers:
  - url: http://localhost/api/v1

paths:
  /cart:
    get:
      summary: Возвращает информацию о корзине покупателя.
      parameters:
        - $ref: '#/components/parameters/customerToken'
        - $ref: '#/components/parameters/productListParamFields'
        - $ref: '#/components/parameters/couponCode'
      responses:
        200:
          description: Успешное выполнение запроса.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    $ref: '#/components/schemas/CartInfo'
                  total:
                    type: number
                    description: Суммарная стоимость позиций
                  discount:
                    type: number
                    description: Общая скидка на всю корзину
                  coupon_valid:
                    type: boolean
                    nullable: true
                    description: true если передан павильный код купона, false если неправильный. Если coupon_code не указан, то значение отсутствует.
        400:
          description: Некорректное содержимое запроса.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/invalidResponse'
    post:
      summary: Изменяет свойства корзины покупателя.
      parameters:
        - $ref: '#/components/parameters/customerToken'
        - $ref: '#/components/parameters/productListParamFields'
        - $ref: '#/components/parameters/couponCode'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - item_id
              properties:
                item_id:
                  type: integer
                  description: ID позиции корзины
                service_variant_id:
                  type: integer
                  description: ID варианта услуги.
                quantity:
                  type: number
                  description: Количество.
      responses:
        200:
          description: Успешное выполнение запроса.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    $ref: '#/components/schemas/CartInfo'
                  total:
                    type: number
                    description: Суммарная стоимость позиций
                  discount:
                    type: number
                    description: Общая скидка на всю корзину
                  coupon_valid:
                    type: boolean
                    nullable: true
                    description: true если передан павильный код купона, false если неправильный. Если coupon_code не указан, то значение отсутствует.
        400:
          description: Некорректное содержимое запроса.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/invalidResponse'
        404:
          description: Не найдено.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/invalidResponse'
    put:
      summary: Добавляет товары и услуги в корзину покупателя.
      parameters:
        - $ref: '#/components/parameters/customerToken'
        - $ref: '#/components/parameters/productListParamFields'
        - $ref: '#/components/parameters/couponCode'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - sku_id
              properties:
                sku_id:
                  type: integer
                  description: ID модификации товара.
                service_variant_id:
                  type: integer
                  description: ID варианта услуги.
                quantity:
                  type: number
                  description: Количество.
      responses:
        200:
          description: Успешное выполнение запроса.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    $ref: '#/components/schemas/CartInfo'
                  total:
                    type: number
                    description: Суммарная стоимость позиций
                  discount:
                    type: number
                    description: Общая скидка на всю корзину
                  coupon_valid:
                    type: boolean
                    nullable: true
                    description: true если передан павильный код купона, false если неправильный. Если coupon_code не указан, то значение отсутствует.
        400:
          description: Некорректное содержимое запроса.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/invalidResponse'
        404:
          description: Не найдено.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/invalidResponse'
    delete:
      summary: Очищает корзину покупателя.
      parameters:
        - $ref: '#/components/parameters/customerToken'
      responses:
        204:
          description: Успешное выполнение запроса.
        400:
          description: Некорректное содержимое запроса.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/invalidResponse'

  /customer_token:
    get:
      summary: Возвращает новый токен покупателя.
      responses:
        200:
          description: Успешное выполнение запроса.
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer_token:
                    type: string
                    description: Токен покупателя.

  /product/{id}:
    get:
      summary: Возвращает информацию о товаре.
      parameters:
        - name: id
          in: path
          required: true
          description: ID товара
          schema:
            type: integer
        - $ref: '#/components/parameters/productListParamFields'
      responses:
        200:
          description: Успешное выполнение запроса.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductInfo'

  /product/{id}/reviews:
    get:
      summary: Возвращает отзывы покупателей о товаре. Ограничения offset и limit работают для отзывов верхнего уровня. Дополнительно к каждому отзыву верхнего уровня будет возвращено полное дерево ответов на него (с ограничением на глубину, если передан параметр depth).
      parameters:
        - name: id
          in: path
          required: true
          description: ID товара
          schema:
            type: integer
        - $ref: '#/components/parameters/productListParamOffset'
        - $ref: '#/components/parameters/productListParamLimit'
        - in: query
          name: tree
          description: Если передано значение больше 0, то список ответов на отзывы будет в виде дерева, а не плоского списка.
          schema:
            type: integer
        - in: query
          name: depth
          description: Если передано значение больше 0, то будут возвращены только ответы на отзывы не дальше указанной глубины
          schema:
            type: integer
        - in: query
          name: parent_review_id
          description: Если передано значение больше 0, то будет возвращен указанный отзыв верхнего уровня и все ответы на него (с ограничением на глубину, если передан параметр depth). Параметры offset и limit игнорируются.
          schema:
            type: integer

      responses:
        200:
          description: Информация об отзывах.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    description: Количество найденных отзывов
                  offset:
                    type: integer
                    description: Смещение относительно начала списка отзывов
                  limit:
                    type: integer
                    description: Количество отзывов верхнего уровня, которые нужно получить.
                  reviews:
                    type: array
                    description: Список отзывов
                    items:
                      $ref: '#/components/schemas/ProductReviewInfo'
        500:
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/invalidResponse'

  /shop:
    get:
      summary: Возвращает информацию о магазине.
      parameters:
        - $ref: '#/components/parameters/customerToken'
      responses:
        200:
          description: Успешное выполнение запроса.
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer_token:
                    type: string
                    description: Токен покупателя.
                  ignore_stock_count:
                    type: integer
                    description: |
                      Флаг, обозначающий игнорирование складских остатков при создании и обработке заказов:

                      + **0**: складские остатки проверяются.
                      + **1**: складские остатки игнорируются.
                  stock_counting_action:
                    type: string
                    description: |
                      Действие с заказами, при выполнении которого обновляются складские остатки заказанных товаров:

                      + **none**: остатки *не обновляются* действиями с заказами.
                      + **create**: остатки обновляются при *создании* заказов.
                      + **processing**: остатки обновляются при *подтверждении заказов.
                    enum:
                      - 'none'
                      - 'create'
                      - 'processing'
                  server_timezone:
                    type: string
                    description: Часовой пояс сервера
                  server_timezone_shift:
                    type: integer
                    description: Смещение часового пояса сервера относительно GMT
                  server_time:
                    type: string
                    description: Текущее время сервера
                  frac_enabled:
                    type: boolean
                    description: Доступность поддержки дробного количества товаров
                  stock_units_enabled:
                    type: boolean
                    description: Доступность поддержки складских единиц измерения количества товаров
                  base_units_enabled:
                    type: boolean
                    description: Доступность поддержки базовых единиц измерения количества товаров
                  debug_mode:
                    type: boolean
                    description: Статус режима разработки
                  is_premium:
                    type: boolean
                    description: Наличие действующей премиум-лицензии
                  address_fields:
                    type: array
                    items:
                      type: string
                  default_currency:
                    type: string
                    description: 3-буквенный код основной валюты витрины
                  currencies:
                    type: array
                    description: Список настроенных валют
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: 3-буквенный код валюты
                        sign:
                          type: string
                          description: Основной символ
                        iso4217:
                          type: string
                          description: Числовой код ISO 4217
                        sign_html:
                          type: string
                          description: HTML-вариант символа
                        title:
                          type: string
                          description: Локализованное название
                        name:
                          type: array
                          description: Ключи локализации для обозначения разных вариантов названия основной единицы
                          items:
                            oneOf:
                            - type: string
                            - type: array
                              items:
                                type: string
                        frac_name:
                          type: array
                          description: Ключи локализации для обозначения разных вариантов названия разменной единицы
                          items:
                            oneOf:
                            - type: string
                            - type: array
                              items:
                                type: string
                        precision:
                          type: integer
                          description: Максимальное количество знаков после десятичного разделителя, допустимое в дробной записи сумм
                        sign_position:
                          type: integer
                          description: |
                            Обозначение положения символа валюты относительно числа
                            + **0**: до числа
                            + **1**: после числа
                          enum:
                            - 0
                            - 1
                        sign_delim:
                          type: string
                          description: Текст для разделения числа и символа валюты
                        rate:
                          type: number
                          description: Курс к основной валюте
                        rounding:
                          type: string
                          description: Режим округления
                        round_up_only:
                          type: boolean
                          description: |
                            Признак необходимости округления только вверх:

                            + **false**: округлять в любую сторону.
                            + **true**: округлять только вверх.
                        sort:
                          type: integer
                          description: Значение сортировки
                        is_primary:
                          type: boolean
                          description: Признак основной валюты
                  shop_name:
                    type: string
                    description: Название магазина
                  shop_phone:
                    type: string
                    description: Номер телефона
                  shop_email:
                    type: string
                    description: Email-адрес
                  shop_country:
                    type: string
                    description: Код страны
                  shop_version:
                    type: string
                    description: Номер версии Shop-Script
                  locale:
                    type: string
                    description: Локаль витрины магазина, например ru_RU или en_US
                  shop_schedule:
                    type: object
                    description: График работы
                    properties:
                      timezone:
                        type: string
                        description: Часовой пояс
                      processing_time:
                        type: number
                        description: Количество рабочих часов на обработку заказа
                      extra_weekends:
                        type: array
                        description: Дополнительные выходные
                        items:
                          type: string
                      extra_workdays:
                        type: array
                        description: Дополнительные рабочие дни
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                              description: Дата
                            start_work:
                              type: string
                              description: Время начала работы
                            end_work:
                              type: string
                              description: Время окончания работы
                            end_processing:
                              type: string
                              description: Время окончания приема заказов в обработку
                      week:
                        type: array
                        description: Основной график работы по дням недели
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              description: Локализованное название дня недели
                            work:
                              type: boolean
                              description: Признак рабочего дня
                            start_work:
                              type: string
                              description: Время начала работы
                            end_work:
                              type: string
                              description: Время окончания работы
                            end_processing:
                              type: string
                              description: Время окончания приема заказов в обработку

  /categories:
    get:
      summary: Возвращает список категорий.
      parameters:
        - $ref: '#/components/parameters/customerToken'
        - in: query
          name: parent_id
          description: если передан, то будут возвращены только потомки указанной категории (включая саму parent_id)
          schema:
            type: integer
        - in: query
          name: tree
          description: Если передано значение больше 0, то список категорий будет в виде дерева, а не плоского списка.
          schema:
            type: integer
        - in: query
          name: depth
          description: Если передано значение больше 0, то будут возвращены только категории не дальше указанной глубины от корня (или parent_id)
          schema:
            type: integer
      responses:
        200:
          description: Информация о категориях товаров.
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    description: Список категорий
                    items:
                      $ref: '#/components/schemas/ProductCategoryInfo'
        500:
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/invalidResponse'

  /category/{category_id}/products:
    get:
      summary: Возвращает список товаров в категории.
      parameters:
        - name: category_id
          in: path
          required: true
          description: ID категории
          schema:
            type: integer
        - $ref: '#/components/parameters/customerToken'
        - $ref: '#/components/parameters/productListParamFields'
        - $ref: '#/components/parameters/productListParamFilters'
        - $ref: '#/components/parameters/productListParamOffset'
        - $ref: '#/components/parameters/productListParamLimit'
        - $ref: '#/components/parameters/productListParamSort'
        - $ref: '#/components/parameters/productListParamOrder'
      responses:
        200:
          description: Информация о найденных товарах.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListInfo'
        500:
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/invalidResponse'

  /set/{set_id}/products:
    get:
      summary: Возвращает товары из указанного списка товаров.
      parameters:
        - name: set_id
          in: path
          required: true
          description: Идентификатор списка
          schema:
            type: string
        - $ref: '#/components/parameters/customerToken'
        - $ref: '#/components/parameters/productListParamFields'
        - $ref: '#/components/parameters/productListParamFilters'
        - $ref: '#/components/parameters/productListParamOffset'
        - $ref: '#/components/parameters/productListParamLimit'
        - $ref: '#/components/parameters/productListParamSort'
        - $ref: '#/components/parameters/productListParamOrder'
      responses:
        200:
          description: Информация о найденных товарах.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListInfo'
        500:
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/invalidResponse'

  /tag/{tag_id}/products:
    get:
      summary: Возвращает товары, помеченные указанным тегом.
      parameters:
        - name: tag_id
          in: path
          required: true
          description: Название тега
          schema:
            type: string
        - $ref: '#/components/parameters/customerToken'
        - $ref: '#/components/parameters/productListParamFields'
        - $ref: '#/components/parameters/productListParamFilters'
        - $ref: '#/components/parameters/productListParamOffset'
        - $ref: '#/components/parameters/productListParamLimit'
        - $ref: '#/components/parameters/productListParamSort'
        - $ref: '#/components/parameters/productListParamOrder'
      responses:
        200:
          description: Информация о найденных товарах.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListInfo'
        500:
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/invalidResponse'

  /products/{product_ids}:
    get:
      summary: Возвращает информацию о товарах с указанными ID.
      parameters:
        - name: product_ids
          in: path
          required: true
          description: Список ID товаров через запятую
          schema:
            type: string
        - $ref: '#/components/parameters/productListParamFields'
      responses:
        200:
          description: Информация о найденных товарах.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListInfo'
        500:
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/invalidResponse'

  /product/{product_id}/related/cross_selling:
    get:
      summary: Возвращает список товаров, выбранных в качестве перекрестных продаж для товара с указанным ID.
      parameters:
        - name: product_id
          in: path
          required: true
          description: ID товара
          schema:
            type: string
        - $ref: '#/components/parameters/customerToken'
        - $ref: '#/components/parameters/productListParamFields'
        - $ref: '#/components/parameters/productListParamFilters'
        - $ref: '#/components/parameters/productListParamOffset'
        - $ref: '#/components/parameters/productListParamLimit'
        - $ref: '#/components/parameters/productListParamSort'
        - $ref: '#/components/parameters/productListParamOrder'
      responses:
        200:
          description: Информация о найденных товарах.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListInfo'
        500:
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/invalidResponse'

  /product/{product_id}/related/upselling:
    get:
      summary: Возвращает товары, выбранные в качестве схожих и альтернативных для товара с указанным ID.
      parameters:
        - name: product_id
          in: path
          required: true
          description: ID товара
          schema:
            type: string
        - $ref: '#/components/parameters/customerToken'
        - $ref: '#/components/parameters/productListParamFields'
        - $ref: '#/components/parameters/productListParamFilters'
        - $ref: '#/components/parameters/productListParamOffset'
        - $ref: '#/components/parameters/productListParamLimit'
        - $ref: '#/components/parameters/productListParamSort'
        - $ref: '#/components/parameters/productListParamOrder'
      responses:
        200:
          description: Информация о найденных товарах.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListInfo'
        500:
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/invalidResponse'

  /products/search:
    get:
      summary: Возвращает товары, соответствующие указанному поисковому запросу.
      parameters:
        - $ref: '#/components/parameters/customerToken'
        - in: query
          name: query
          description: Поисковый запрос
          schema:
            type: string
        - $ref: '#/components/parameters/productListParamFields'
        - $ref: '#/components/parameters/productListParamFilters'
        - $ref: '#/components/parameters/productListParamOffset'
        - $ref: '#/components/parameters/productListParamLimit'
        - $ref: '#/components/parameters/productListParamSort'
        - $ref: '#/components/parameters/productListParamOrder'
      responses:
        200:
          description: Информация о найденных товарах.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListInfo'
        500:
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/invalidResponse'

  /promos:
    get:
      summary: Возвращает действующие промоакции для текущей витрины
      responses:
        200:
          description: Информация о промоакциях.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: ID промоакции
                    name:
                      type: string
                      description: Название промоакции
                    enabled:
                      type: integer
                      description: Статус промоакции (остановлена/действует)
                    note:
                      nullable: true
                      type: string
                    start_datetime:
                      type: string
                      nullable: true
                      description: Дата и время начала промоакции
                    finish_datetime:
                      type: string
                      nullable: true
                      description: Дата и время окончания промоакции
                    rules:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                            description: ID правила промоакции
                          promo_id:
                            type: integer
                            description: ID промоакции к которой относится правило
                          rule_type:
                            type: string
                            description: Тип правила
                            enum:
                              - banner
                              - custom_price
                              - utm
                              - coupon
                          rule_params:
                            type: object
                            nullable: true
                            properties:
                              banners:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    type:
                                      type: string
                                    title:
                                      type: string
                                      description: Заголовок
                                    body:
                                      type: string
                                      description: Подзаголовок промокарточки
                                    link:
                                      type: string
                                      description: Ссылка
                                    color:
                                      type: string
                                      description: Цвет текста
                                    background_color:
                                      type: string
                                      description: Цвет фона
                                    countdown_datetime:
                                      type: string
                                      nullable: true
                                      description: Дата обратного отсчета
                                    image:
                                      type: string
                                      format: uri
                                      description: URL баннера

  /shipping/list:
    get:
      summary: Возвращает способы доставок для текущей витрины
      responses:
        200:
          description: Информация о способах доставки.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: ID способа доставки
                    plugin:
                      type: string
                      description: ID плагина
                    name:
                      type: string
                      description: Название способа доставки
                    description:
                      type: string
                      description: Описание способа доставки
                    logo:
                      type: string
                      nullable: true
                      format: uri
                      description: URL логотипа способа доставки

  /order/calculate:
    post:
      summary: Валидация данных заказа без создания заказа
      parameters:
        - $ref: '#/components/parameters/customerToken'
        - $ref: '#/components/parameters/couponCode'
      requestBody:
        content:
          application/json:
            schema:
              - $ref: '#/components/schemas/orderCalculateCreateParams'
      responses:
        200:
          description: Заказ прошёл валидацию без ошибок
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    $ref: '#/components/schemas/OrderCartInfo'
                  total:
                    type: number
                    description: Суммарная стоимость позиций
                  discount:
                    type: number
                    description: Общая скидка на всю корзину

  /order/create:
    post:
      summary: Создание заказа
      parameters:
        - $ref: '#/components/parameters/customerToken'
        - $ref: '#/components/parameters/couponCode'
      requestBody:
        content:
          application/json:
            schema:
              - $ref: '#/components/schemas/orderCalculateCreateParams'
      responses:
        200:
          description: Заказ успешно создан
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: id созданного заказа

  /shipping/costs:
    post:
      summary: Возвращает варианты и стоимость доставки указанной корзины на указанный адрес
      parameters:
        - $ref: '#/components/parameters/customerToken'
        - $ref: '#/components/parameters/couponCode'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - address
              properties:
                address:
                  - $ref: '#/components/schemas/shippingAddress'
      responses:
        200:
          description: Информация о способах доставки.
          content:
            application/json:
              schema:
                type: object
                properties:
                  shipping_types:
                    type: array
                    description: Человекочитаемые названия типов доставки (курьер, почта, самовывоз)
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string

                  shipping:
                    type: array
                    description: Список вариантов доставки
                    items:
                      type: object
                      properties: 
                        variant_id: 
                          type: string
                          description: Идентификатор варианта доставки для сохранения при создании заказа
                        plugin: 
                          type: string
                          description: Идентификатор службы доставки
                        plugin_name: 
                          type: string
                          description: Название службы доставки
                        logo: 
                          type: string
                          description: URL логотипа службы доставки
                        name: 
                          type: string
                          description: Название варианта доставки (например, название конкретного пункта выдачи заказов)
                        description: 
                          type: string
                          description: Описание варианта доставки
                        rate: 
                          type: number
                          description: Стоимость доставки в валюте currency
                        rate_exact: 
                          type: string
                          description: Стоимость доставки в виде строки позволяет избежать ошибок представления в виде числа с плавающей точкой
                        rate_str: 
                          type: string
                          description: Человекочитаемая стоимость доставки с указанием валюты, формат plaintext
                        rate_html: 
                          type: string
                          description: Человекочитаемая стоимость доставки с указанием валюты, формат HTML
                        currency: 
                          type: string
                          description: 3-буквенный код валюты, например, RUB
                        type: 
                          type: string
                          enum:
                            - todoor
                            - post
                            - pickup
                          description: Тип доставки, один из shipping_types. Курьер, почта, самовывоз.
                        est_delivery: 
                          type: string
                          description: Ориентировочная дата доставки, человекочитаемая строка.
                        delivery_date: 
                          type: array
                          description: Ориентировочная дата доставки, машиночитаемый формат. Одна или две даты. Одна - доставка в указанный день. Две - возможный интервал доставки.
                          items: 
                            type: string
                            description: Дата в формате "2001-01-31 00:00:01"

components:
  schemas:
    invalidResponse:
      type: object
      properties:
        error:
          type: string
          description: Код ошибки
        error_description:
          type: string
          description: Описание ошибки
    ProductListInfo:
      type: object
      properties:
        count:
          type: integer
          description: Количество найденных товаров
        offset:
          type: integer
          description: Смещение относительно начала списка отфильтрованных товаров
        limit:
          type: integer
          description: Количество товаров, которые нужно получить
        products:
          type: array
          description: Список товаров
          items:
            $ref: '#/components/schemas/ProductInfo'
    ProductReviewInfo:
      type: object
      description: Отзыв покупателя о товаре или комментарий на отзыв
      properties:
        id:
          type: integer
          description: ID отзыва
        depth:
          type: integer
          description: Глубина в дереве комментариев. У отзыва depth=0, у комментария depth>0.
        parent_id:
          type: integer
          description: ID отзыва или комментария, ответом на который является текущий комментарий.
        datetime:
          type: string
          description: Время создания отзыва или комментария в формате 'YYYY-MM-DD hh:mm:ss'
        title:
          type: string
          description: Заголовок
        text:
          type: string
          description: Текст
        rate:
          type: number
          description: Оценка товара. Бывает только у отзывов, у комментариев отсутствует.
          nullable: true
        author_name:
          type: string
          description: Имя автора
        author_photo_url_20:
          type: string
          description: Аватар автора, квадрат размером 20 пикселей
        author_photo_url_50:
