          items:
            $ref: '#/components/schemas/ProductReviewImageInfo'
        comments:
          type: array
          description: Комментарии на текущий отзыв или комментарий. Без параметра tree все комментарии будут внутри отзыва плоским списком. Если передан непустой параметр tree, то комментарии будут древовидной структурой, каждый непосредственно внутри того комментария, на который оставлен.
          items:
            $ref: '#/components/schemas/ProductReviewInfo'
    ProductReviewImageInfo:
      type: object
      description: Фотография товара, оставленная покупателем вместе с отзывом на товар
      properties:
        id:
          type: integer
          description: ID фотографии
        description:
          type: string
          description: Описание фотографии
        width:
          type: integer
          description: Ширина картинки в пикселях
