<form id="wf-fulfilling-form" action="?module=workflow&action=perform" method="post">
    <input type="hidden" name="id" value="{$order_id}">
    <input type="hidden" name="action_id" value="{$action_id}">

    <label>
        [`Responsible for the fulfillment`]:
        <select name="fulfillment_contact_id">
            <option value="0"></option>
            {if $fulfillment_users}
                <optgroup label="[`Fulfillments`]">
                    {foreach $fulfillment_users as $fu}
                    <option value="{$fu.id}">{$fu.name|escape}</option>
                    {/foreach}
                </optgroup>
            {/if}
            {if $webasyst_users}
                <optgroup label="[`All users`]">
                    {foreach $webasyst_users as $wu}
                    <option value="{$wu.id}">{$wu.name|escape}</option>
                    {/foreach}
                </optgroup>
            {/if}
        </select>
    </label>


    <div class="custom-my-16">
        {if !empty($plugins_html)}
            {foreach $plugins_html as $plugin_id => $html}
                <!-- {$plugin_id} -->
                {$html}
            {/foreach}
        {/if}
    </div>

    <footer class="js-form-footer-actions">
        <input class="js-submit-button button orange" type="submit" value="[`Start fulfillment`]">
        <a class="cancel button light-gray js-cancel-button" href="javascript:void(0);">[`Cancel`]</a>
    </footer>
</form>

<script type="text/javascript">
    (function () {
        'use strict';

        // cancel link
        $('#wf-fulfilling-form .js-cancel-button').on('click', function () {
            $('#workflow-content').empty().hide();
            $('.workflow-actions').show();
            return false;
        });

        $('#wf-fulfilling-form').submit(function () {
            let that = $(this);
            that.find(':submit').attr('disabled', true);
            $.post(that.attr('action'), that.serialize(), function (response) {
                if (response.status === 'ok') {
                    if ('order' in $) {
                        $.order.reload();
                    }
                } else if (response.status === 'fail') {
                    if (response.errors[0]) {
                        alert(response.errors[0].shift());
                    }
                }
                that.find(':submit').attr('disabled', false);
            }, 'json');
            return false;
        });
    }());
</script>
